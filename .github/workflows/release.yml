name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Validate and publish release
    runs-on: ubuntu-24.04
    env:
      MODULE_PATH: github.com/oracle-samples/otel-collector-exporter-oracleobservability
      EXPORTER_IMPORT: github.com/oracle-samples/otel-collector-exporter-oracleobservability/oracleobservabilityexporter
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate tag and Collector dependency line
        id: release-line
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, got ${version}"
            exit 1
          fi

          major="${version#v}"
          major="${major%%.*}"
          minor="$(printf '%s' "$version" | cut -d. -f2)"
          if [ "$major" != "0" ]; then
            echo "This release workflow currently supports the v0 Collector-aligned release line only."
            exit 1
          fi

          expected="v0.${minor}.0"
          mismatches="$(go list -m all | awk -v expected="$expected" '$1 ~ /^go\.opentelemetry\.io\/collector\// && $2 ~ /^v0\./ && $2 != expected {print}')"
          if [ -n "$mismatches" ]; then
            echo "Collector v0 module dependencies must match ${expected}:"
            echo "$mismatches"
            exit 1
          fi
          echo "COLLECTOR_VERSION=${expected}" >> "$GITHUB_ENV"
          echo "COLLECTOR_VERSION_NO_V=${expected#v}" >> "$GITHUB_ENV"
          echo "collector_version=${expected}" >> "$GITHUB_OUTPUT"

      - name: Check go mod tidy
        shell: bash
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Install OpenTelemetry Collector Builder
        run: go install go.opentelemetry.io/collector/cmd/builder@${COLLECTOR_VERSION}

      - name: Write temporary release builder manifest
        shell: bash
        run: |
          cat > "${RUNNER_TEMP}/builder-config.yaml" <<EOF
          dist:
            module: ${MODULE_PATH}/release/otelcol
            name: otelcol-oracleobservability-release-check
            description: Release validation collector with Oracle Observability exporter
            output_path: ${RUNNER_TEMP}/otelcol-oracleobservability-release-check
            otelcol_version: ${COLLECTOR_VERSION_NO_V}

          exporters:
            - gomod: go.opentelemetry.io/collector/exporter/debugexporter ${COLLECTOR_VERSION}
            - gomod: ${MODULE_PATH} ${GITHUB_REF_NAME}
              import: ${EXPORTER_IMPORT}
              name: oracleobservabilityexporter

          receivers:
            - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver ${COLLECTOR_VERSION}

          processors:
            - gomod: go.opentelemetry.io/collector/processor/batchprocessor ${COLLECTOR_VERSION}
            - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor ${COLLECTOR_VERSION}

          extensions:
            - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/storage/filestorage ${COLLECTOR_VERSION}

          providers:
            - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.59.0
            - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.59.0
            - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.59.0

          replaces:
            - ${MODULE_PATH} => ${GITHUB_WORKSPACE}
          EOF

      - name: Build custom collector release smoke binary
        run: |
          "$(go env GOPATH)/bin/builder" --config "${RUNNER_TEMP}/builder-config.yaml"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Compatibility: `${{ github.ref_name }}` is aligned with OpenTelemetry Collector/Contrib `${{ steps.release-line.outputs.collector_version }}`.
