name: Docs

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.yaml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Validate docs and examples
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate YAML syntax
        shell: bash
        run: |
          python -m pip install --user pyyaml
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          failures = []
          for path in sorted(Path(".").rglob("*")):
              if path.suffix != ".yaml":
                  continue
              if ".git" in path.parts:
                  continue
              try:
                  with path.open("r", encoding="utf-8") as handle:
                      yaml.safe_load(handle)
              except Exception as exc:
                  failures.append(f"{path}: {exc}")

          if failures:
              print("YAML validation failed:", file=sys.stderr)
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          PY

      - name: Check tracked docs for local absolute paths
        shell: bash
        run: |
          if grep -R "/Users/" README.md oracleobservabilityexporter --include='*.md' --include='*.yaml'; then
            echo "Tracked docs or examples contain local /Users/ paths."
            exit 1
          fi

      - name: Link check
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: "--verbose --no-progress README.md CONTRIBUTING.md .github/pull_request_template.md"
          failIfEmpty: false
