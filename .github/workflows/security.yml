name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # 10:00 Monday IST is 04:30 Monday UTC.
    - cron: "30 4 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: oracleobservabilityexporter/go.mod
          cache: true
          cache-dependency-path: oracleobservabilityexporter/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: oracleobservabilityexporter
        run: |
          "$(go env GOPATH)/bin/govulncheck" ./...

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: oracleobservabilityexporter/go.mod
          cache: true
          cache-dependency-path: oracleobservabilityexporter/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Build for CodeQL
        working-directory: oracleobservabilityexporter
        run: go test ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
